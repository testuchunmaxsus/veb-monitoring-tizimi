[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["migrations", "venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.isort]
profile = "black"
line_length = 100
skip = ["migrations", "venv"]
